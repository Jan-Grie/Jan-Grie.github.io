<!doctype html>
<html>
<head>
<meta name="viewport" content="width-device-width, initial-scale=1">
<meta charset="utf-8">
<title>Uhr</title>
<style>
	#clock {
		font-size: 20px;
		letter-spacing: 2px;
		color: #fff;
		width: 200px;
		height: 50px;
		text-align: center;
		line-height: 43px;
		border: 2px solid #fff;
		border-radius: 20px;
	}
	
.center {
  margin: 0;
  position: absolute;
  top: 50%;
  left: 50%;
  -ms-transform: translate(-50%, -50%);
  transform: translate(-50%, -50%);
}
	


	
</style>
<script>
setInterval(showTime, 1000);
function showTime() {
	let time = new Date();
	let hour = time.getHours();
	let min = time.getMinutes();
	let sec = time.getSeconds();
	timer = "Uhr";
	
	hour = hour < 10 ? "0" + hour : hour;
	min = min < 10 ? "0" + min : min;
	sec = sec < 10 ? "0" + sec : sec;
	
	let currentTime = hour + ":"
		+ min + ":" + sec + timer;
	
	document.getElementById("clock")
		.innerHTML = currentTime;

}
</script>
	<!--- Alter Background Style: style="background-color: #0C1D30" --->
</head>
		
<body  style="background-color: #0C1D30" >
	
	<div class="center" id="clock">
	
	</div>
	
</body>
</html>
